name: iOS Build

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '.github/workflows/ios-build.yml'
      - '**/*.gradle.kts'
      - '**/*.kt'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.h'
      - '**/*.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - '.github/workflows/ios-build.yml'
      - '**/*.gradle.kts'
      - '**/*.kt'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.h'
      - '**/*.yml'

env:
  CODE_SIGN_IDENTITY: "-"
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"
  Xcode_VERSION: "15.2"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Shared Module
        run: ./gradlew :shared:build

      - name: Build iOS Framework
        run: ./gradlew :iosApp:linkDebugFrameworkIosArm64

      - name: Find and Copy Framework
        id: find-framework
        run: |
          echo "=== Listing iosApp/build/bin/iosArm64 ==="
          ls -laR iosApp/build/bin/iosArm64/ 2>/dev/null | head -50 || echo "No bin directory"
          echo ""
          echo "=== Finding all .framework directories ==="
          FRAMEWORK_DIR=$(find iosApp/build -name "*.framework" -type d 2>/dev/null | head -1)
          echo "Found framework dirs: $FRAMEWORK_DIR"
          if [ -n "$FRAMEWORK_DIR" ] && [ -d "$FRAMEWORK_DIR" ]; then
            FRAMEWORK_NAME=$(basename "$FRAMEWORK_DIR")
            mkdir -p iosApp/build/libs
            cp -r "$FRAMEWORK_DIR" iosApp/build/libs/
            echo "framework_path=iosApp/build/libs/$FRAMEWORK_NAME" >> $GITHUB_OUTPUT
            echo "Found and copied framework: $FRAMEWORK_NAME"
          else
            echo "Checking alternative locations..."
            ls -la iosApp/build/bin/iosArm64/*/ 2>/dev/null || echo "No subdirs"
            ls -la iosApp/build/bin/iosArm64/debug/ 2>/dev/null || echo "No debug dir"
            ls -la iosApp/build/libs/ 2>/dev/null || echo "No libs dir"
          fi

      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Generate Xcode Project
        run: |
          cd iosApp
          xcodegen generate
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Build .app with Xcode
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find .app Bundle
        id: find-app
        run: |
          APP_PATH=$(find iosApp/build/DerivedData -name "*.app" -type d 2>/dev/null | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app bundle:"
          echo "$APP_PATH"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            iosApp/build/**/*.framework
            iosApp/build/libs/**/*.framework
            iosApp/build/DerivedData/**/*.app
            iosApp/build/DerivedData/**/*.dSYM
            shared/build/**/*.klib
            build/reports/
          retention-days: 7

  lint:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Kotlin Lint
        run: ./gradlew detekt || true
