name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up XcodeGen
        run: brew install xcodegen

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared module
        run: make shared-build

      - name: Generate Xcode project and build unsigned app bundle
        run: |
          chmod +x scripts/build-ipa.sh
          scripts/build-ipa.sh

      - name: Zip unsigned app bundle
        if: always()
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          if [ -d build/unsigned/MicYouIOS.app ]; then
            ditto -c -k --sequesterRsrc --keepParent build/unsigned/MicYouIOS.app ci-artifacts/MicYouIOS.app.zip
          fi
          if [ -f build/MicYouIOS.xcarchive ]; then
            ditto -c -k --sequesterRsrc --keepParent build/MicYouIOS.xcarchive ci-artifacts/MicYouIOS.xcarchive.zip
          fi
          if [ -f build/reports/problems/problems-report.html ]; then
            cp build/reports/problems/problems-report.html ci-artifacts/problems-report.html
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: micyou-ios-build-artifacts
          path: ci-artifacts/**
          if-no-files-found: ignore
