name: iOS Build

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '.github/workflows/ios-build.yml'
      - '**/*.gradle.kts'
      - '**/*.kt'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.h'
  pull_request:
    branches: [ main, master ]
    paths:
      - '.github/workflows/ios-build.yml'
      - '**/*.gradle.kts'
      - '**/*.kt'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.h'

env:
  # Skip code signing for CI builds
  CODE_SIGN_IDENTITY: ""
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Shared Module
        run: ./gradlew :shared:build

      - name: Build iOS App (Gradle)
        run: ./gradlew :iosApp:build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-gradle-artifacts
          path: |
            iosApp/build/**/*.framework
            iosApp/build/**/*.klib
            shared/build/**/*.klib
            build/reports/
            build/logs/
          retention-days: 7

  xcode-build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build for Simulator (Unsigned)
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        run: |
          cd iosApp
          xcodebuild -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find .app Bundle
        id: find-app
        run: |
          APP_PATH=$(find iosApp/build/DerivedData -name "*.app" -type d 2>/dev/null | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app bundle:"
          echo "$APP_PATH"

      - name: Upload .app Bundle
        if: steps.find-app.outputs.app_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: |
            iosApp/build/DerivedData/**/*.app
            iosApp/build/DerivedData/**/*.dSYM
          retention-days: 7

  lint:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Kotlin Lint
        run: ./gradlew detekt || true
