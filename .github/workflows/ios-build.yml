name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up XcodeGen
        run: brew install xcodegen

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared module
        run: make shared-build

      - name: Build iOS app
        run: make ios-build

      - name: Zip app bundle if present
        if: always()
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -path '*Build/Products/Release-iphonesimulator/*.app' -maxdepth 8 2>/dev/null | head -n 1 || true)
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" ci-artifacts/MicYouIOS.app.zip
          fi
          if [ -f build/reports/problems/problems-report.html ]; then
            cp build/reports/problems/problems-report.html ci-artifacts/problems-report.html
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: micyou-ios-build-artifacts
          path: ci-artifacts/**
          if-no-files-found: ignore
