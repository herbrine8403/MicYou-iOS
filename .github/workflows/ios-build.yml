name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is available
        run: |
          if [ -x ./gradlew ]; then
            echo "Using project wrapper"
          else
            echo "Using system gradle"
            echo "GRADLE=gradle" >> "$GITHUB_ENV"
          fi

      - name: Build shared module
        run: make shared-build

      - name: Build iOS app scaffold
        run: make ios-sim-build

      - name: Collect iPA artifacts
        if: always()
        run: |
          mkdir -p ci-artifacts
          find . -type f \( -name "*.ipa" -o -name "*.xcarchive" -o -name "problems-report.html" \) -print0 | while IFS= read -r -d '' file; do
            cp -R "$file" ci-artifacts/
          done

      - name: Upload iPA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: micyou-ios-ipa-and-reports
          path: ci-artifacts/**
          if-no-files-found: ignore
