name: iOS Build

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '.github/workflows/ios-build.yml'
      - '**/*.gradle.kts'
      - '**/*.kt'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.h'
      - '**/*.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - '.github/workflows/ios-build.yml'
      - '**/*.gradle.kts'
      - '**/*.kt'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.h'
      - '**/*.yml'

env:
  CODE_SIGN_IDENTITY: "-"
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"
  Xcode_VERSION: "15.2"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Shared Module
        run: ./gradlew :shared:build

      - name: List iOS Tasks
        run: ./gradlew :iosApp:tasks --group=build | grep -i "framework\|link\|ios"

      - name: Build iOS Framework
        run: |
          FRAMEWORK_TASK=$(./gradlew :iosApp:tasks --group=build 2>/dev/null | grep -i "framework" | head -1 | awk '{print $1}')
          if [ -n "$FRAMEWORK_TASK" ]; then
            echo "Running task: $FRAMEWORK_TASK"
            ./gradlew :iosApp:$FRAMEWORK_TASK
          else
            echo "No framework task found, compiling Kotlin..."
            ./gradlew :iosApp:compileKotlinIosSimulatorArm64
          fi

      - name: Find and Copy Framework
        id: find-framework
        run: |
          echo "=== Listing iosApp/build directory ==="
          ls -laR iosApp/build/ 2>/dev/null | head -100 || echo "No build directory"
          echo ""
          echo "=== Finding all .framework directories ==="
          FRAMEWORK_DIR=$(find iosApp/build -name "*.framework" -type d 2>/dev/null | head -1)
          if [ -n "$FRAMEWORK_DIR" ] && [ -d "$FRAMEWORK_DIR" ]; then
            FRAMEWORK_NAME=$(basename "$FRAMEWORK_DIR")
            mkdir -p iosApp/build/libs
            cp -r "$FRAMEWORK_DIR" iosApp/build/libs/
            echo "framework_path=iosApp/build/libs/$FRAMEWORK_NAME" >> $GITHUB_OUTPUT
            echo "Found and copied framework: $FRAMEWORK_NAME"
          else
            echo "No framework found in iosApp/build"
          fi

      - name: Update project.yml with Framework Path
        if: steps.find-framework.outputs.framework_path != ''
        run: |
          FRAMEWORK_PATH="${{ steps.find-framework.outputs.framework_path }}"
          FRAMEWORK_NAME=$(basename "$FRAMEWORK_PATH")
          sed -i '' "s|FRAMEWORK_PLACEHOLDER|$FRAMEWORK_PATH|g" iosApp/project.yml
          echo "Updated project.yml with framework: $FRAMEWORK_PATH"

      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Generate Xcode Project
        run: |
          cd iosApp
          xcodegen generate
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Build .app with Xcode
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find .app Bundle
        id: find-app
        run: |
          APP_PATH=$(find iosApp/build/DerivedData -name "*.app" -type d 2>/dev/null | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app bundle:"
          echo "$APP_PATH"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            iosApp/build/**/*.framework
            iosApp/build/libs/**/*.framework
            iosApp/build/DerivedData/**/*.app
            iosApp/build/DerivedData/**/*.dSYM
            shared/build/**/*.klib
            build/reports/
          retention-days: 7

  lint:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Kotlin Lint
        run: ./gradlew detekt || true
