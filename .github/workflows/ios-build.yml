name: iOS Build

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '.github/workflows/ios-build.yml'
      - '**/*.gradle.kts'
      - '**/*.kt'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.h'
  pull_request:
    branches: [ main, master ]
    paths:
      - '.github/workflows/ios-build.yml'
      - '**/*.gradle.kts'
      - '**/*.kt'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.h'

env:
  CODE_SIGN_IDENTITY: ""
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Shared Module
        run: ./gradlew :shared:build

      - name: Build iOS App Framework
        run: ./gradlew :iosApp:linkDebugFrameworkIosSimulatorArm64

      - name: Find Framework
        id: find-framework
        run: |
          FRAMEWORK_DIR=$(find iosApp/build -name "*.framework" -type d 2>/dev/null | head -1)
          echo "framework_dir=$FRAMEWORK_DIR" >> $GITHUB_OUTPUT
          echo "Found framework:"
          echo "$FRAMEWORK_DIR"

      - name: Create .app Structure
        run: |
          APP_DIR="iosApp/build/DerivedData/MicYou.app"
          FRAMEWORK_PATH="${{ steps.find-framework.outputs.framework_dir }}"
          
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          
          if [ -d "$FRAMEWORK_PATH" ]; then
            cp -r "$FRAMEWORK_PATH" "$APP_DIR/Contents/Frameworks/"
          fi
          
          # Create minimal Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>MacOS/MicYou</string>
            <key>CFBundleIdentifier</key>
            <string>com.micyou.ios.MicYou</string>
            <key>CFBundleName</key>
            <string>MicYou</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
          </dict>
          </plist>
          EOF
          
          echo "Created app structure at: $APP_DIR"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            iosApp/build/**/*.framework
            iosApp/build/DerivedData/**/*.app
            shared/build/**/*.klib
            build/reports/
          retention-days: 7

  lint:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Kotlin Lint
        run: ./gradlew detekt || true
