name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared module
        run: make shared-build

      - name: Build iOS app scaffold
        run: make ios-sim-build

      - name: Archive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: micyou-ios-build-logs
          path: |
            **/build/reports/**
            **/build/logs/**
            **/build/outputs/**
          if-no-files-found: ignore
