name: iosApp
fileFormat: Xcode_15_4

options:
  bundleIdPrefix: com.micyou
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15.2"
  minimumXcodeGenVersion: "2.35.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: MicYou
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: src/main/swift
        type: group
      - path: src/main/objc
        type: group
      - path: src/main/resources
        type: group
      - path: Info.plist
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.micyou.ios.MicYou
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
    dependencies: []
